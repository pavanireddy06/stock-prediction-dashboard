<!DOCTYPE html>
<html>
<head>
    <title>Stock Dashboard</title>
</head>

<body style="display:flex;justify-content:center;align-items:center;height:100vh;background:#020617;color:white;">

<div style="background:#1e293b;padding:40px;border-radius:10px;text-align:center;">

    <h2>Stock Prediction</h2>

    <input type="text" id="stock" placeholder="Enter stock (MSFT)" style="padding:10px;margin:10px;">

    <button onclick="predict()" style="padding:10px;background:#3b82f6;color:white;border:none;">
        Predict
    </button>

    <p id="result"></p>

    <img id="graph" width="300">

</div>

<script>
async function predict() {
    const stock = document.getElementById("stock").value;

    const res = await fetch("/api/predict", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ stock })
    });

    const data = await res.json();

    document.getElementById("result").innerText =
        data.prediction + " | Accuracy: " + data.accuracy + "%";

    document.getElementById("graph").src =
        "/static/graph.png?" + new Date().getTime();
}
</script>

</body>
</html>
